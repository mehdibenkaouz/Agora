<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AGORÀ — Study Map</title>
<link rel="icon" type="image/png" sizes="32x32" href="item/Logoaagora.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg: #e8e2d5;
  --panel: #f5f0e8;
  --panel2: #faf7f2;
  --text: #1a1008;
  --muted: #6b5b48;
  --brand: #571929;
  --brand2: #8b2239;
  --gold: #c9932a;
  --line: rgba(87,25,41,0.12);
  --shadow: 0 20px 50px rgba(30,10,5,0.25);
  --soft: 0 8px 24px rgba(30,10,5,0.10);
}
:root[data-theme="dark"] {
  --bg: #0a0d12;
  --panel: #12171f;
  --panel2: #1a2030;
  --text: #f0e8d8;
  --muted: rgba(200,220,255,0.55);
  --brand: #a8ebf6;
  --brand2: #7dd8e8;
  --gold: #25acc1;
  --line: rgba(168,235,246,0.13);
  --shadow: 0 20px 50px rgba(0,0,0,0.70);
  --soft: 0 8px 24px rgba(0,0,0,0.45);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Lora',Georgia,serif;transition:background .25s,color .25s;}

/* ── TOPBAR ── */
.topbar{
  height:60px;background:var(--panel);
  border-bottom:1px solid var(--line);
  box-shadow:var(--soft);
  padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:1000;
  flex-shrink:0;
}
.topbar-brand{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.14em;color:var(--brand);text-decoration:none;text-transform:uppercase;}
.topbar-center{display:flex;flex-direction:column;align-items:center;}
.topbar-title{font-family:'Cinzel',serif;font-size:.95rem;letter-spacing:.08em;}
.topbar-sub{font-size:.65rem;font-style:italic;color:var(--muted);letter-spacing:.04em;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.btn-icon{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:transparent;cursor:pointer;display:grid;place-items:center;transition:background .15s;color:var(--text);}
.btn-icon:hover{background:var(--line);}
.btn-icon svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── LAYOUT ── */
.app{display:flex;height:calc(100vh - 60px);}

/* ── SIDEBAR ── */
.sidebar{
  width:300px;flex-shrink:0;
  background:var(--panel);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  overflow:hidden;
  z-index:500;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.sidebar.collapsed{transform:translateX(-300px);position:absolute;top:60px;bottom:0;}
.sidebar-head{
  padding:16px 18px 12px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.sidebar-title{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--brand);margin-bottom:2px;}
.sidebar-sub{font-size:.72rem;color:var(--muted);}

/* FILTERS */
.filters{padding:14px 18px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;flex:1;}
.filter-label{font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.tag-group{display:flex;flex-wrap:wrap;gap:6px;}
.tag{
  padding:5px 12px;border-radius:999px;
  border:1px solid var(--line);
  background:var(--panel2);
  font-family:'Cinzel',serif;font-size:.62rem;
  letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;color:var(--muted);
  transition:all .15s;user-select:none;
}
.tag:hover{border-color:var(--brand);color:var(--brand);}
.tag.active{background:var(--brand);color:#fff;border-color:transparent;}
:root[data-theme="dark"] .tag.active{color:#0a0d12;}

.type-btns{display:flex;gap:8px;}
.type-btn{
  flex:1;padding:8px;border-radius:12px;
  border:1px solid var(--line);background:var(--panel2);
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:4px;transition:all .15s;
  font-family:'Cinzel',serif;font-size:.6rem;
  letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
}
.type-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.type-btn:hover{border-color:var(--brand);color:var(--brand);}
.type-btn.active{background:var(--brand);color:#fff;border-color:transparent;}
:root[data-theme="dark"] .type-btn.active{color:#0a0d12;}

.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--panel2);border:1px solid var(--line);
  border-radius:12px;padding:8px 12px;
}
.search-box svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;}
.search-box input{
  border:none;background:transparent;
  color:var(--text);font-family:'Lora',serif;
  font-size:.82rem;outline:none;width:100%;
}
.search-box input::placeholder{color:var(--muted);}

/* SESSION LIST */
.session-list{flex:1;overflow-y:auto;padding:0 18px 18px;}
.session-card{
  background:var(--panel2);border:1px solid var(--line);
  border-radius:14px;padding:12px 14px;margin-bottom:8px;
  cursor:pointer;transition:all .15s;
}
.session-card:hover{border-color:var(--brand);transform:translateY(-1px);box-shadow:var(--soft);}
.session-card.highlighted{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand);}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.sc-name{font-family:'Cinzel',serif;font-size:.78rem;font-weight:600;color:var(--text);}
.sc-type{
  font-size:.58rem;font-family:'Cinzel',serif;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 8px;border-radius:999px;
}
.sc-type.persona{background:rgba(87,25,41,0.12);color:var(--brand);}
.sc-type.luogo{background:rgba(201,147,42,0.15);color:var(--gold);}
:root[data-theme="dark"] .sc-type.persona{background:rgba(168,235,246,0.12);color:var(--brand);}
.sc-topic{font-size:.72rem;color:var(--muted);margin-bottom:4px;}
.sc-meta{display:flex;gap:8px;flex-wrap:wrap;}
.sc-tag{font-size:.6rem;font-family:'Cinzel',serif;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:999px;border:1px solid var(--line);color:var(--muted);}

/* ── MAP ── */
.map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}

/* Leaflet popup override */
.leaflet-popup-content-wrapper{
  background:var(--panel)!important;
  color:var(--text)!important;
  border:1px solid var(--line)!important;
  border-radius:16px!important;
  box-shadow:var(--shadow)!important;
  padding:0!important;
}
.leaflet-popup-content{margin:0!important;width:220px!important;}
.leaflet-popup-tip{background:var(--panel)!important;}
.leaflet-popup-close-button{color:var(--muted)!important;top:8px!important;right:10px!important;}

.popup-inner{padding:16px;}
.popup-type{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--brand);margin-bottom:4px;}
.popup-name{font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;margin-bottom:4px;}
.popup-topic{font-size:.8rem;color:var(--muted);margin-bottom:10px;line-height:1.5;}
.popup-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
.popup-tag{font-size:.58rem;font-family:'Cinzel',serif;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);}
.popup-meta{font-size:.7rem;color:var(--muted);margin-bottom:10px;}
.popup-btn{
  width:100%;padding:9px;border-radius:999px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;border:none;font-family:'Cinzel',serif;
  font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;transition:opacity .15s;
}
:root[data-theme="dark"] .popup-btn{color:#0a0d12;}
.popup-btn:hover{opacity:.85;}

/* ── FAB (add session) ── */
.fab{
  position:absolute;bottom:28px;right:24px;z-index:900;
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  border:none;cursor:pointer;
  display:grid;place-items:center;
  box-shadow:0 8px 28px rgba(87,25,41,0.45);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
}
.fab:hover{transform:scale(1.1);box-shadow:0 12px 36px rgba(87,25,41,0.55);}
.fab svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;}
:root[data-theme="dark"] .fab svg{stroke:#0a0d12;}

/* ── LOCATE BTN ── */
.locate-btn{
  position:absolute;bottom:92px;right:24px;z-index:900;
  width:42px;height:42px;border-radius:50%;
  background:var(--panel);border:1px solid var(--line);
  cursor:pointer;display:grid;place-items:center;
  box-shadow:var(--soft);transition:all .15s;color:var(--text);
}
.locate-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
.locate-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── SIDEBAR TOGGLE ── */
.sidebar-toggle{
  position:absolute;top:12px;left:12px;z-index:900;
  width:36px;height:36px;border-radius:50%;
  background:var(--panel);border:1px solid var(--line);
  cursor:pointer;display:none;place-items:center;
  box-shadow:var(--soft);color:var(--text);
}
.sidebar-toggle svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--panel);border:1px solid var(--line);
  border-radius:24px;padding:28px;
  width:100%;max-width:440px;
  box-shadow:var(--shadow);
  max-height:90vh;overflow-y:auto;
}
.modal-title{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.06em;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:.8rem;color:var(--muted);margin-bottom:20px;}
.form-group{margin-bottom:16px;}
.form-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block;}
.form-input,.form-textarea,.form-select{
  width:100%;padding:10px 14px;
  background:var(--panel2);border:1px solid var(--line);
  border-radius:12px;color:var(--text);
  font-family:'Lora',serif;font-size:.85rem;outline:none;
  transition:border-color .15s;
}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--brand);}
.form-textarea{resize:vertical;min-height:80px;}
.form-select{cursor:pointer;}
.tag-picker{display:flex;flex-wrap:wrap;gap:6px;}
.form-actions{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{flex:1;padding:11px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--muted);font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
.btn-submit{flex:2;padding:11px;border-radius:999px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border:none;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
:root[data-theme="dark"] .btn-submit{color:#0a0d12;}

/* ── LOCATION PERMISSION BANNER ── */
.loc-banner{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  z-index:800;
  background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:10px 18px;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--soft);font-size:.8rem;color:var(--muted);
  white-space:nowrap;
}
.loc-banner.hidden{display:none;}
.loc-banner-btn{
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;
  background:var(--brand);color:#fff;border:none;border-radius:999px;
  padding:5px 14px;cursor:pointer;
}
:root[data-theme="dark"] .loc-banner-btn{color:#0a0d12;}

/* ── EMPTY STATE ── */
.empty-list{padding:20px;text-align:center;color:var(--muted);font-size:.8rem;font-style:italic;}

/* POI TOGGLE */
.poi-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--panel2);border:1px solid var(--line);
  border-radius:12px;cursor:pointer;transition:border-color .15s;
}
.poi-toggle:hover{border-color:var(--brand);}
.poi-toggle-label{font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);}
.poi-switch{width:36px;height:20px;border-radius:999px;background:var(--line);position:relative;transition:background .2s;flex-shrink:0;}
.poi-switch.on{background:var(--brand);}
.poi-switch::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;}
.poi-switch.on::after{transform:translateX(16px);}

/* Mobile */
@media(max-width:640px){
  .sidebar{position:absolute;top:0;bottom:0;z-index:600;}
  .sidebar.collapsed{transform:translateX(-100%);}
  .sidebar-toggle{display:grid;}
  .map-wrap{flex:1;}
}
</style>
</head>
<body>

<header class="topbar">
  <a href="index.html" class="topbar-brand">← AGORÀ</a>
  <div class="topbar-center">
    <span class="topbar-title">Study Map</span>
    <span class="topbar-sub">trova persone con cui studiare e incontrarti</span>
  </div>
  <div class="topbar-right">
    <button class="btn-icon" id="themeBtn" title="Toggle theme">
      <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-head">
      <div class="sidebar-title">Sessioni vicino a te</div>
      <div class="sidebar-sub" id="sessionCount">— sessioni trovate</div>
    </div>

    <div class="filters">

      <div class="filter-section">
        <div class="filter-label">Cerca</div>
        <div class="search-box">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><path d="M16 16l4 4"/></svg>
          <input type="text" id="searchInput" placeholder="argomento, nome…">
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label">Tipo</div>
        <div class="type-btns">
          <button class="type-btn active" data-type="all">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18"/><path d="M3 12h18"/></svg>
            Tutti
          </button>
          <button class="type-btn" data-type="persona">
            <svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="8" r="4"/></svg>
            Persona
          </button>
          <button class="type-btn" data-type="luogo">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            Luogo
          </button>
        </div>
      </div>

<div class="filter-section">
        <div class="poi-toggle" id="poiToggle">
          <span class="poi-toggle-label">📍 Luoghi OSM (biblioteche, università…)</span>
          <div class="poi-switch on" id="poiSwitch"></div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label">Area tematica</div>
        <div class="tag-group" id="topicFilters"></div>
      </div>

    </div>

    <div class="session-list" id="sessionList"></div>

  </aside>

  <!-- MAP -->
  <div class="map-wrap">
    <div id="map"></div>

    <!-- Location banner -->
    <div class="loc-banner" id="locBanner">
      <span>📍 Vuoi vedere le sessioni vicino a te?</span>
      <button class="loc-banner-btn" id="locBtn">Consenti</button>
      <button class="btn-icon" onclick="document.getElementById('locBanner').classList.add('hidden')" style="width:24px;height:24px;border:none;">
        <svg viewBox="0 0 24 24" width="12" height="12"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Locate me -->
    <button class="locate-btn" id="locateBtn" title="Centrami sulla mappa">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 2"/></svg>
    </button>

    <!-- FAB -->
    <button class="fab" id="fabBtn" title="Aggiungi sessione">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- Sidebar toggle mobile -->
    <button class="sidebar-toggle" id="sidebarToggle">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>

</div>

<!-- ADD SESSION MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Nuova Sessione</div>
    <div class="modal-sub">Pubblica dove e cosa vuoi studiare — o un luogo dove incontrarti</div>

    <div class="form-group">
      <label class="form-label">Il tuo nome / nickname</label>
      <input class="form-input" id="fName" placeholder="Es. Marco, Studio_Philosophy…">
    </div>

    <div class="form-group">
      <label class="form-label">Tipo di sessione</label>
      <select class="form-select" id="fType">
        <option value="persona">Persona — sono io, mi sposto</option>
        <option value="luogo">Luogo fisso — biblioteca, caffè, università…</option>
      </select>
    </div>

    <div class="form-group" id="fPlaceGroup">
      <label class="form-label">Nome del luogo</label>
      <input class="form-input" id="fPlace" placeholder="Es. Biblioteca Universitaria, Bar Centrale…">
    </div>

    <div class="form-group">
      <label class="form-label">Argomento / descrizione</label>
      <textarea class="form-textarea" id="fTopic" placeholder="Es. Studio analisi matematica per l'esame di giovedì, o semplicemente chiacchiere di filosofia…"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Tag tematici</label>
      <div class="tag-picker" id="tagPicker"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Disponibile per</label>
      <select class="form-select" id="fDuration">
        <option value="30 min">30 minuti</option>
        <option value="1 ora" selected>1 ora</option>
        <option value="2 ore">2 ore</option>
        <option value="tutto il giorno">Tutto il giorno</option>
        <option value="questa settimana">Questa settimana</option>
      </select>
    </div>

    <div class="form-group" id="fGeoStatus" style="font-size:.78rem;color:var(--muted);display:none;"></div>

    <div class="form-actions">
      <button class="btn-cancel" id="modalCancel">Annulla</button>
      <button class="btn-submit" id="modalSubmit">Pubblica →</button>
    </div>
  </div>
</div>

<script>
// ── Theme ──────────────────────────────────────────────────────────
const THEME_KEY="agora_theme";
let isDark=false;
function applyTheme(t){
  isDark=t==="dark";
  document.documentElement[isDark?"setAttribute":"removeAttribute"]("data-theme","dark");
  localStorage.setItem(THEME_KEY,t);
  if(window._map)updateTiles();
}
(function(){
  const s=localStorage.getItem(THEME_KEY);
  applyTheme((s==="dark"||s==="light")?s:(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"));
})();
document.getElementById("themeBtn").addEventListener("click",()=>{
  applyTheme(isDark?"light":"dark");
});

// ── Topics ─────────────────────────────────────────────────────────
const TOPICS=[
  "Matematica","Fisica","Informatica","Filosofia","Economia",
  "Letteratura","Storia","Diritto","Medicina","Biologia",
  "Chimica","Musica","Arte","Lingue","Politica","Psicologia","Ingegneria"
];
const TOPIC_COLORS={
  "Matematica":"#4a90d9","Fisica":"#7b68ee","Informatica":"#20b2aa",
  "Filosofia":"#c9932a","Economia":"#3a8a3a","Letteratura":"#cd853f",
  "Storia":"#a0522d","Diritto":"#708090","Medicina":"#dc143c",
  "Biologia":"#228b22","Chimica":"#9400d3","Musica":"#ff6347",
  "Arte":"#ff69b4","Lingue":"#1e90ff","Politica":"#b22222",
  "Psicologia":"#da70d6","Ingegneria":"#ff8c00"
};

// ── API ────────────────────────────────────────────────────────────
const API_BASE="https://agora-api.convergegame.workers.dev";
const TOKEN_KEY="agora_token";
let sessions=[];

async function loadSessions(){
  document.getElementById("sessionCount").textContent="Caricamento…";
  try{
    const res=await fetch(`${API_BASE}/api/map/sessions`);
    const data=await res.json();
    if(data.ok){sessions=data.sessions||[];}
    else{sessions=[];}
  }catch(e){sessions=[];}
  refresh();
}
// ── State ──────────────────────────────────────────────────────────
let activeTopics=new Set();
let activeType="all";
let searchQ="";
let markers={};
let userLat=44.498,userLng=11.347; // default: Bologna
let userMarker=null;
let tileLayer=null;

// ── MAP INIT ───────────────────────────────────────────────────────
const map=L.map("map",{zoomControl:false,attributionControl:true}).setView([userLat,userLng],15);
window._map=map;

L.control.zoom({position:"bottomleft"}).addTo(map);

function getTileUrl(){
  return isDark
    ? "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
    : "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png";
}

function updateTiles(){
  if(tileLayer)map.removeLayer(tileLayer);
  tileLayer=L.tileLayer(getTileUrl(),{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
    maxZoom:19
  }).addTo(map);
}
updateTiles();

// ── CUSTOM MARKER ICONS ────────────────────────────────────────────
function makeIcon(type,tags){
  const color=type==="persona"?"#571929":"#c9932a";
  const darkColor=type==="persona"?"#a8ebf6":"#25acc1";
  const c=isDark?darkColor:color;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="36" height="44" viewBox="0 0 36 44">
    <path d="M18 2C10.3 2 4 8.3 4 16c0 10 14 26 14 26S32 26 32 16C32 8.3 25.7 2 18 2z" fill="${c}" stroke="white" stroke-width="2"/>
    <circle cx="18" cy="16" r="6" fill="white" opacity="0.9"/>
    ${type==="persona"
      ? `<path d="M18 11a3 3 0 1 1 0 6 3 3 0 0 1 0-6z" fill="${c}"/><path d="M12.5 21a5.5 5.5 0 0 1 11 0" fill="${c}" stroke="none"/>`
      : `<path d="M13 13h10M13 16h10M13 19h7" stroke="${c}" stroke-width="1.5" stroke-linecap="round"/>`
    }
  </svg>`;
  return L.divIcon({
    html:svg,className:"",iconSize:[36,44],iconAnchor:[18,44],popupAnchor:[0,-44]
  });
}

// ── RENDER MARKERS ─────────────────────────────────────────────────
function renderMarkers(list){
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};
  list.forEach(s=>{
    const m=L.marker([s.lat,s.lng],{icon:makeIcon(s.type,s.tags)})
      .addTo(map)
      .bindPopup(buildPopup(s),{maxWidth:240});
    m.on("click",()=>highlightCard(s.id));
    markers[s.id]=m;
  });
}

function buildPopup(s){
  return `<div class="popup-inner">
    <div class="popup-type">${s.type==="persona"?"👤 Persona":"📍 Luogo"}</div>
    <div class="popup-name">${s.name}</div>
    ${s.place?`<div class="popup-topic" style="font-size:.7rem;font-style:italic;">${s.place}</div>`:""}
    <div class="popup-topic">${s.topic}</div>
    <div class="popup-tags">${s.tags.map(t=>`<span class="popup-tag">${t}</span>`).join("")}</div>
    <div class="popup-meta">⏱ ${s.duration} &nbsp;·&nbsp; ${s.time}</div>
    <button class="popup-btn" onclick="contactSession(${s.id})">Contatta →</button>
  </div>`;
}

// ── RENDER SIDEBAR LIST ────────────────────────────────────────────
function renderList(list){
  const el=document.getElementById("sessionList");
  document.getElementById("sessionCount").textContent=`${list.length} session${list.length===1?"e":"i"} trovate`;
  if(!list.length){el.innerHTML=`<div class="empty-list">Nessuna sessione trovata.<br>Sii il primo ad aggiungerla! ✨</div>`;return;}
  el.innerHTML=list.map(s=>`
    <div class="session-card" id="card-${s.id}" onclick="focusSession(${s.id})">
      <div class="sc-top">
        <div class="sc-name">${s.name}</div>
        <div class="sc-type ${s.type}">${s.type==="persona"?"Persona":"Luogo"}</div>
      </div>
      <div class="sc-topic">${s.topic.length>80?s.topic.slice(0,80)+"…":s.topic}</div>
      <div class="sc-meta">
        ${s.tags.map(t=>`<span class="sc-tag">${t}</span>`).join("")}
        <span class="sc-tag">⏱ ${s.duration}</span>
      </div>
    </div>
  `).join("");
}

function highlightCard(id){
  document.querySelectorAll(".session-card").forEach(c=>c.classList.remove("highlighted"));
  const card=document.getElementById("card-"+id);
  if(card){card.classList.add("highlighted");card.scrollIntoView({behavior:"smooth",block:"nearest"});}
}

function focusSession(id){
  const s=sessions.find(x=>x.id===id);if(!s)return;
  map.setView([s.lat,s.lng],16,{animate:true});
  setTimeout(()=>{if(markers[id])markers[id].openPopup();},400);
  highlightCard(id);
}

window.contactSession=function(id){
  const s=sessions.find(x=>x.id===id);if(!s)return;
  window.location.href=`index.html?studyContact=${encodeURIComponent(s.name)}`;
};
// ── FILTER ─────────────────────────────────────────────────────────
function getFiltered(){
  return sessions.filter(s=>{
    if(activeType!=="all"&&s.type!==activeType)return false;
    if(activeTopics.size>0&&!s.tags.some(t=>activeTopics.has(t)))return false;
    if(searchQ){
      const q=searchQ.toLowerCase();
      if(!s.name.toLowerCase().includes(q)&&!s.topic.toLowerCase().includes(q)&&!s.tags.some(t=>t.toLowerCase().includes(q)))return false;
    }
    return true;
  });
}

function refresh(){
  const list=getFiltered();
  renderList(list);
  renderMarkers(list);
}

// ── TOPIC FILTER PILLS ─────────────────────────────────────────────
function buildTopicFilters(){
  const el=document.getElementById("topicFilters");
  TOPICS.forEach(t=>{
    const d=document.createElement("div");
    d.className="tag";d.textContent=t;
    d.addEventListener("click",()=>{
      if(activeTopics.has(t))activeTopics.delete(t);
      else activeTopics.add(t);
      d.classList.toggle("active",activeTopics.has(t));
      refresh();
    });
    el.appendChild(d);
  });
}

// ── TYPE FILTER ────────────────────────────────────────────────────
document.querySelectorAll(".type-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".type-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeType=btn.dataset.type;
    refresh();
  });
});

// ── SEARCH ─────────────────────────────────────────────────────────
document.getElementById("searchInput").addEventListener("input",e=>{
  searchQ=e.target.value.trim();
  refresh();
});

// ── TAG PICKER (modal) ─────────────────────────────────────────────
let selectedTags=new Set();
function buildTagPicker(){
  const el=document.getElementById("tagPicker");
  TOPICS.forEach(t=>{
    const d=document.createElement("div");
    d.className="tag";d.textContent=t;
    d.addEventListener("click",()=>{
      if(selectedTags.has(t))selectedTags.delete(t);
      else selectedTags.add(t);
      d.classList.toggle("active",selectedTags.has(t));
    });
    el.appendChild(d);
  });
}

// ── MODAL ──────────────────────────────────────────────────────────
let pendingLat=null,pendingLng=null;

document.getElementById("fabBtn").addEventListener("click",()=>{
  selectedTags=new Set();
  document.querySelectorAll("#tagPicker .tag").forEach(t=>t.classList.remove("active"));
  document.getElementById("fName").value="";
  document.getElementById("fTopic").value="";
  document.getElementById("fPlace").value="";
  document.getElementById("fType").value="persona";
  document.getElementById("fDuration").value="1 ora";
  document.getElementById("fPlaceGroup").style.display="none";
  document.getElementById("fGeoStatus").style.display="none";
  document.getElementById("modalOverlay").classList.add("open");

  // Try get current location
  pendingLat=userLat;pendingLng=userLng;
  if(navigator.geolocation){
    const gs=document.getElementById("fGeoStatus");
    gs.style.display="block";gs.textContent="📍 Rilevamento posizione…";
    navigator.geolocation.getCurrentPosition(pos=>{
      pendingLat=pos.coords.latitude;pendingLng=pos.coords.longitude;
      gs.textContent="✅ Posizione rilevata!";
    },()=>{gs.textContent="⚠️ Posizione non disponibile — useremo il centro mappa.";pendingLat=map.getCenter().lat;pendingLng=map.getCenter().lng;});
  }
});

document.getElementById("fType").addEventListener("change",e=>{
  document.getElementById("fPlaceGroup").style.display=e.target.value==="luogo"?"block":"none";
});

document.getElementById("modalCancel").addEventListener("click",()=>{
  document.getElementById("modalOverlay").classList.remove("open");
});
document.getElementById("modalOverlay").addEventListener("click",e=>{
  if(e.target===document.getElementById("modalOverlay"))document.getElementById("modalOverlay").classList.remove("open");
});

document.getElementById("modalSubmit").addEventListener("click",async()=>{
  const name=document.getElementById("fName").value.trim();
  const topic=document.getElementById("fTopic").value.trim();
  const type=document.getElementById("fType").value;
  const place=document.getElementById("fPlace").value.trim();
  const duration=document.getElementById("fDuration").value;
  if(!name||!topic){alert("Inserisci almeno il nome e l'argomento.");return;}

  const token=localStorage.getItem(TOKEN_KEY);
  const btn=document.getElementById("modalSubmit");
  btn.textContent="Pubblicazione…";btn.disabled=true;

  try{
    const res=await fetch(`${API_BASE}/api/map/sessions`,{
      method:"POST",
      headers:{"Content-Type":"application/json",...(token?{"Authorization":"Bearer "+token}:{})},
      body:JSON.stringify({name,type,place,topic,tags:[...selectedTags],duration,lat:pendingLat||userLat,lng:pendingLng||userLng})
    });
    const data=await res.json();
    if(data.ok){
      document.getElementById("modalOverlay").classList.remove("open");
      await loadSessions();
      setTimeout(()=>focusSession(data.id),300);
    }else{
      alert("Errore: "+( data.error||"sconosciuto"));
    }
  }catch(e){
    alert("Errore di connessione.");
  }finally{
    btn.textContent="Pubblica →";btn.disabled=false;
  }
});

// ── GEOLOCATION ────────────────────────────────────────────────────
function locateUser(){
  if(!navigator.geolocation){alert("Geolocalizzazione non supportata dal browser.");return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    document.getElementById("locBanner").classList.add("hidden");
    map.setView([userLat,userLng],15,{animate:true});
    if(userMarker)map.removeLayer(userMarker);
    userMarker=L.circleMarker([userLat,userLng],{
      radius:10,fillColor:"#571929",color:"white",weight:2,fillOpacity:.9
    }).addTo(map).bindPopup("📍 Sei qui");
  },()=>alert("Impossibile rilevare la posizione. Controlla i permessi del browser."));
}

document.getElementById("locBtn").addEventListener("click",locateUser);
document.getElementById("locateBtn").addEventListener("click",locateUser);

// ── POI — OpenStreetMap via Overpass API ───────────────────────────
let poiMarkers=[];
let poiVisible=true;
let poiLastBounds=null;
let poiLoading=false;

const POI_TYPES=[
  {key:"amenity",values:["university","library","college","cafe","bar","community_centre"],emoji:"🎓📚☕",label:{university:"Università",library:"Biblioteca",college:"Istituto",cafe:"Caffè",bar:"Bar",community_centre:"Centro Comunitario"}},
  {key:"leisure",values:["park","garden"],emoji:"🌿",label:{park:"Parco",garden:"Giardino"}},
  {key:"building",values:["university","college"],emoji:"🏛️",label:{university:"Edificio Università",college:"Edificio Istituto"}},
];

function poiColor(tags){
  const a=tags.amenity,l=tags.leisure;
  if(a==="university"||a==="college"||tags.building==="university")return"#4a90d9";
  if(a==="library")return"#c9932a";
  if(a==="cafe"||a==="bar")return"#3a8a3a";
  if(l==="park"||l==="garden")return"#228b22";
  return"#708090";
}

function poiLabel(tags){
  if(tags.amenity)return POI_TYPES[0].label[tags.amenity]||tags.amenity;
  if(tags.leisure)return POI_TYPES[1].label[tags.leisure]||tags.leisure;
  if(tags.building)return POI_TYPES[2].label[tags.building]||tags.building;
  return"Luogo";
}

function poiEmoji(tags){
  const a=tags.amenity,l=tags.leisure;
  if(a==="university"||a==="college")return"🎓";
  if(a==="library")return"📚";
  if(a==="cafe")return"☕";
  if(a==="bar")return"🍺";
  if(a==="community_centre")return"🏛️";
  if(l==="park"||l==="garden")return"🌿";
  return"📍";
}

function makePOIIcon(tags){
  const c=poiColor(tags);
  const emoji=poiEmoji(tags);
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="32" height="38" viewBox="0 0 32 38">
    <path d="M16 2C9.9 2 5 6.9 5 13c0 8.5 11 23 11 23S27 21.5 27 13C27 6.9 22.1 2 16 2z" fill="${c}" stroke="white" stroke-width="1.5" opacity="0.85"/>
    <circle cx="16" cy="13" r="7" fill="white" opacity="0.92"/>
    <text x="16" y="17" text-anchor="middle" font-size="9">${emoji}</text>
  </svg>`;
  return L.divIcon({html:svg,className:"",iconSize:[32,38],iconAnchor:[16,38],popupAnchor:[0,-38]});
}

function buildPOIPopup(el){
  const tags=el.tags||{};
  const name=tags.name||tags["name:it"]||tags["name:en"]||poiLabel(tags);
  const type=poiLabel(tags);
  const hours=tags.opening_hours||"";
  const website=tags.website||tags["contact:website"]||"";
  const addr=[tags["addr:street"],tags["addr:housenumber"]].filter(Boolean).join(" ");
  return `<div class="popup-inner">
    <div class="popup-type">${poiEmoji(tags)} ${type}</div>
    <div class="popup-name">${name}</div>
    ${addr?`<div class="popup-topic" style="font-size:.7rem">${addr}</div>`:""}
    ${hours?`<div class="popup-meta">🕐 ${hours}</div>`:""}
    ${website?`<div class="popup-meta"><a href="${website}" target="_blank" style="color:var(--brand)">🌐 Sito web</a></div>`:""}
    <div class="popup-meta" style="opacity:.5;font-size:.65rem">Dati © OpenStreetMap contributors</div>
  </div>`;
}

async function loadPOI(){
  if(!poiVisible||poiLoading)return;
  const bounds=map.getBounds();
  // Non ricaricare se i bounds sono quasi uguali
  if(poiLastBounds&&poiLastBounds.contains(bounds)&&bounds.contains(poiLastBounds.pad(-0.1)))return;
  poiLoading=true;
  poiLastBounds=bounds.pad(0.05);
  const{_southWest:sw,_northEast:ne}=poiLastBounds;

  // Overpass query: tutti i POI rilevanti nel bbox
  const query=`[out:json][timeout:15];
(
  node["amenity"~"university|library|college|cafe|bar|community_centre"](${sw.lat},${sw.lng},${ne.lat},${ne.lng});
  node["leisure"~"park|garden"](${sw.lat},${sw.lng},${ne.lat},${ne.lng});
  way["amenity"~"university|library|college"](${sw.lat},${sw.lng},${ne.lat},${ne.lng});
  way["leisure"~"park|garden"](${sw.lat},${sw.lng},${ne.lat},${ne.lng});
)->.all;
out center 120;`;

  try{
    const res=await fetch("https://overpass-api.de/api/interpreter",{
      method:"POST",body:query
    });
    const data=await res.json();
    clearPOI();
    (data.elements||[]).forEach(el=>{
      const lat=el.lat||(el.center&&el.center.lat);
      const lng=el.lon||(el.center&&el.center.lon);
      if(!lat||!lng)return;
      const tags=el.tags||{};
      if(!tags.name&&!tags["name:it"])return; // salta luoghi senza nome
      const m=L.marker([lat,lng],{icon:makePOIIcon(tags),zIndexOffset:-100})
        .addTo(map)
        .bindPopup(buildPOIPopup(el),{maxWidth:240});
      poiMarkers.push(m);
    });
  }catch(e){
    // Overpass non disponibile — silenzioso
  }finally{
    poiLoading=false;
  }
}

function clearPOI(){
  poiMarkers.forEach(m=>map.removeLayer(m));
  poiMarkers=[];
}

// Toggle POI on/off
document.getElementById("poiToggle").addEventListener("click",()=>{
  poiVisible=!poiVisible;
  document.getElementById("poiSwitch").classList.toggle("on",poiVisible);
  if(poiVisible){loadPOI();}else{clearPOI();}
});

// Ricarica POI quando la mappa si sposta (con debounce)
let poiDebounce=null;
map.on("moveend",()=>{
  if(!poiVisible)return;
  clearTimeout(poiDebounce);
  poiDebounce=setTimeout(loadPOI,600);
});

// ── MOBILE SIDEBAR TOGGLE ──────────────────────────────────────────
document.getElementById("sidebarToggle").addEventListener("click",()=>{
  document.getElementById("sidebar").classList.toggle("collapsed");
});

// ── INIT ───────────────────────────────────────────────────────────
buildTopicFilters();
buildTagPicker();
loadSessions();
loadPOI();
</script>
