<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGORA — Principles</title>
  <style>
    :root{
  --bg:#f5f1e8;
  --panel:#fffdf8;
  --text:#111;
  --muted:#444;
  --brand:#571929;
    }
    :root[data-theme="dark"]{
      --bg:#0f1115;
      --panel:#151821;
      --text:#f2f2f2;
      --muted:rgba(255,255,255,0.70);
      --brand:#571929;
    }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #f5f1e8;
      color: #111;
    }
    .wrap {
      width: min(calc(100% - 32px), 980px);
      margin: 0 auto;
      padding: 40px 0 80px;
    }
    a { color: #571929; text-decoration: none; }
    .card {
      background: #fffdf8;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 18px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
    }
    ul {
      line-height: 1.8;
      color: #444;
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="index.html">← Back to Home</a></p>
    <div class="card">
      <h1>Principles</h1>
      <ul>
        <li>Equal standing between users.</li>
        <li>Dialogue before spectacle.</li>
        <li>Shared culture over empty metrics.</li>
        <li>Clarity, context, and civil disagreement.</li>
      </ul>
    </div>
  </div>
  <script>
  const THEME_KEY="agora_theme";
  const saved = localStorage.getItem(THEME_KEY);
  const theme = (saved==="dark"||saved==="light") ? saved :
    (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  if (theme==="dark") document.documentElement.setAttribute("data-theme","dark");
</script>
</body>
</html>
